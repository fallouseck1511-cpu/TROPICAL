services:
  - type: web
    name: sgrdms-tropical
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sgrdms-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: sgrdms-db
    databaseName: sgrdms
    user: sgrdms_user
    plan: free
